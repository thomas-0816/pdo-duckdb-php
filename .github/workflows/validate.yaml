name: Validate release

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  linux_macos:
    name: Linux, MacOS
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-26.04
          - ubuntu-24.04-arm
          - ubuntu-26.04-arm
          - macos-14
          - macos-15
          - macos-26
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: pie
        env:
          phpts: ${{ matrix.thread-safety }}
      - name: Install and test the extension
        shell: bash
        env:
          os: ${{ matrix.os }}
        run: |
          uname -a
          php -v
          sudo pie install thomas-0816/pdo-duckdb-php
          php -m | grep duckdb
          php <<'EOF'
              <?php
              if (!extension_loaded("pdo_duckdb")) throw new Exception('Error loading');
              $db = new PDO("duckdb::memory:");
              $db->exec("CREATE TABLE t(i INTEGER, s VARCHAR)");
              $db->exec("INSERT INTO t VALUES (1, 'foo'), (2, 'bar')");
              $t = $db->query("SELECT * FROM t ORDER BY i")->fetchAll(PDO::FETCH_KEY_PAIR);
              if ($t !== ['1' => 'foo', '2' => 'bar']) throw new Exception('Error select');
              echo 'ok', PHP_EOL;
          EOF
          echo 'OK'

  windows:
    name: Windows
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - windows-2025
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: pie
        env:
          phpts: ${{ matrix.thread-safety }}
      - name: Install and test the extension
        shell: bash
        env:
          os: ${{ matrix.os }}
        run: |
          uname -a
          php -v
          pie install thomas-0816/pdo-duckdb-php
          php -m | grep duckdb
          php <<'EOF'
              <?php
              if (!extension_loaded("pdo_duckdb")) throw new Exception('Error loading');
              $db = new PDO("duckdb::memory:");
              $db->exec("CREATE TABLE t(i INTEGER, s VARCHAR)");
              $db->exec("INSERT INTO t VALUES (1, 'foo'), (2, 'bar')");
              $t = $db->query("SELECT * FROM t ORDER BY i")->fetchAll(PDO::FETCH_KEY_PAIR);
              if ($t !== ['1' => 'foo', '2' => 'bar']) throw new Exception('Error select');
              echo 'ok', PHP_EOL;
          EOF
          echo 'OK'

  frankenphp:
    name: "FrankenPHP"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup
        run: |
          sudo curl -s https://pkg.henderkes.com/api/packages/85/debian/repository.key -o /etc/apt/keyrings/static-php85.asc
          echo "deb [signed-by=/etc/apt/keyrings/static-php85.asc] https://pkg.henderkes.com/api/packages/85/debian php-zts main" | \
              sudo tee -a /etc/apt/sources.list.d/static-php85.list
          sudo apt-get update
          sudo apt-get install php-zts-cli php-zts-pdo frankenphp pie-zts
          sudo pie-zts install thomas-0816/pdo-duckdb-php
          frankenphp php-cli -r 'print_r((new PDO("duckdb::memory:"))->query("SELECT 42 as n")->fetch(PDO::FETCH_ASSOC));'
          frankenphp php-server -l 127.0.0.1:8080 -r ./ &
          sleep 3
          curl -IsS http://127.0.0.1:8080/test.php
          ab -n 100 -c 8 -l http://127.0.0.1:8080/test.php 2>&1 | tee /dev/stderr | grep -E "Failed requests:\s+0"

  wolfi:
    name: "Docker: Wolfi OS"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --no-cache -f Dockerfile.wolfi -t pdo_duckdb_wolfi .

  fedora:
    name: "Docker: Fedora"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --no-cache -f Dockerfile.fedora -t pdo_duckdb_fedora .

  amazon:
    name: "Docker: Amazon Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --no-cache -f Dockerfile.amazon -t pdo_duckdb_amazon .

  phpofficial:
    name: "Docker: php official"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --pull --no-cache -f Dockerfile.php -t pdo_duckdb_php .

  debian:
    name: "Docker: Debian"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --pull --no-cache -f Dockerfile.debian13 -t pdo_duckdb_debian .

  opensuse:
    name: "Docker: openSUSE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container
        run: docker build --pull --no-cache -f Dockerfile.opensuse -t pdo_duckdb_opensuse .

  clamav:
    name: "Docker: clamAV"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container and run clamAV
        run: |
          gh release download -p "*" -D . -R thomas-0816/pdo-duckdb-php
          ls -lisah
          docker run --rm --entrypoint sh -v $(pwd):/app clamav/clamav:latest /app/clamdscan.sh
