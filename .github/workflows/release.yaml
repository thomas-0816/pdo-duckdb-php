name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  linux_macos:
    name: Linux, MacOS
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # publish release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}
      - name: Download DuckDB static libs for this os/arch
        shell: bash
        env:
          os: ${{ matrix.os }}
        run: |
          apt-get update && apt-get install -y --no-install-recommends libgcc-13-dev
          case "$os" in
            ubuntu-24.04)     libduckdb=static-libs-linux-amd64.zip ;;
            ubuntu-24.04-arm) libduckdb=static-libs-linux-arm64.zip ;;
            macos-14)         libduckdb=static-libs-osx-arm64.zip ;;
            *) echo "unmapped runner os"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.5/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.5/${libduckdb}" -o libduckdb.zip
          unzip -o libduckdb.zip -d ./
      - name: Build and upload prebuilt binary
        uses: php/pie-ext-binary-builder@5298761950f63c7e9565ed7004e922b346e4386c # 0.0.3
        with:
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--with-pdo-duckdb'

  windows:
    name: Windows
    runs-on: windows-2022
    permissions:
      contents: write # publish release
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        ts:
          - nts
          - ts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download libduckdb
        shell: pwsh
        run: |
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.5/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive duckdb.zip -DestinationPath . -Force
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.5/libduckdb-src.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb-src.zip
          Expand-Archive duckdb-src.zip -DestinationPath . -Force
          Get-ChildItem -Path .
          tzutil /s "W. Europe Standard Time"
      - name: Build extension
        uses: php/php-windows-builder/extension@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8 # 1.8.1
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: x64
          args: --with-pdo-duckdb
          test-workers: 1
      - name: Bundle duckdb.dll, name to the release tag, upload as a release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem artifacts -Filter "php_pdo_duckdb-*.zip" |
                 Where-Object { $_.Name -notlike '*-logs*' } | Select-Object -First 1
          if (-not $zip) { throw "no extension artifact zip produced" }
          if ($zip.BaseName -notmatch '(\d+\.\d+-(?:nts|ts)-vs\d+-\w+)$') {
            throw "unexpected artifact name: $($zip.Name)"
          }
          $newbase = "php_pdo_duckdb-$Env:tag-$($matches[1])"
          Expand-Archive $zip.FullName -DestinationPath stage -Force
          Get-ChildItem stage -Filter "php_pdo_duckdb-*.dll" | ForEach-Object { Rename-Item $_.FullName "$newbase.dll" }
          Get-ChildItem stage -Filter "php_pdo_duckdb-*.pdb" | ForEach-Object { Rename-Item $_.FullName "$newbase.pdb" }
          Copy-Item duckdb.dll -Destination stage\ -Force
          $out = "$newbase.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path stage\* -DestinationPath $out
          Write-Host "uploading $out $Env:tag"
          gh release upload "$Env:tag" "$out" --clobber

  clamav:
    name: "Docker: clamAV"
    runs-on: ubuntu-latest
    needs: [linux_macos, windows]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build container and run clamAV
        run: |
          gh release download -p "*" -D . -R thomas-0816/pdo-duckdb-php
          ls -lisah
          docker run --rm --entrypoint sh -v $(pwd):/app clamav/clamav:latest /app/clamdscan.sh

  publish:
    name: "Publish: packagist"
    runs-on: ubuntu-latest
    needs: [clamav]
    steps:
      - name: Publish release on Packagist
        env:
          TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -fsSL -X POST -H 'content-type:application/json' -H "Authorization: Bearer thomas-0816:${TOKEN}" \
            "https://packagist.org/api/update-package" -d'{"repository":{"url":"https://packagist.org/packages/thomas-0816/pdo-duckdb-php"}}'
