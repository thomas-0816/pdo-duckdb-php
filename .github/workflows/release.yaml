name: Release binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: ${{ matrix.os }} php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Download DuckDB static libs for this os/arch
        shell: bash
        run: |
          apt-get update && apt-get install -y --no-install-recommends libgcc-13-dev
          case "${{ matrix.os }}" in
            ubuntu-24.04)     libduckdb=static-libs-linux-amd64.zip ;;
            ubuntu-24.04-arm) libduckdb=static-libs-linux-arm64.zip ;;
            *) echo "unmapped runner ${{ matrix.os }}"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/${libduckdb}" -o libduckdb.zip
          unzip -o -q libduckdb.zip -d ./

      - name: Build and upload prebuilt binary
        uses: php/pie-ext-binary-builder@0.0.3
        with:
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--with-pdo-duckdb'
