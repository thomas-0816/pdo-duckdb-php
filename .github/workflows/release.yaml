name: Release binaries

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  linux_macos:
    name: Linux, MacOS
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # publish release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}
      - name: Download DuckDB static libs for this os/arch
        shell: bash
        env:
          os: ${{ matrix.os }}
        run: |
          apt-get update && apt-get install -y --no-install-recommends libgcc-13-dev
          case "$os" in
            ubuntu-24.04)     libduckdb=static-libs-linux-amd64.zip ;;
            ubuntu-24.04-arm) libduckdb=static-libs-linux-arm64.zip ;;
            macos-14)         libduckdb=static-libs-osx-arm64.zip ;;
            *) echo "unmapped runner os"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/${libduckdb}" -o libduckdb.zip
          unzip -o libduckdb.zip -d ./
      - name: Build and upload prebuilt binary
        uses: php/pie-ext-binary-builder@5298761950f63c7e9565ed7004e922b346e4386c
        with:
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--with-pdo-duckdb'

  windows:
    name: Windows
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        ts:
          - nts
          - ts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download libduckdb
        shell: pwsh
        run: |
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive duckdb.zip -DestinationPath . -Force
          Get-ChildItem -Path .
          tzutil /s "W. Europe Standard Time"
      - name: Build extension
        uses: php/php-windows-builder/extension@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: x64
          args: --with-pdo-duckdb
          test-workers: 1

  release:
    runs-on: ubuntu-latest
    name: Release
    needs: windows
    permissions:
      contents: write # publish release

    steps:
      - name: Upload artifact to the release
        uses: php/php-windows-builder/release@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8
        with:
          release: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
