name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  composer-validate:
    name: "Validate using Composer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer
      - name: Validate
        run: composer validate --strict

  linux:
    name: "Linux"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP ${{ matrix.php-version }} ${{ matrix.thread-safety }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}
          fail-fast: true
      - name: Build & Test
        run: |
          sudo timedatectl set-timezone "Europe/Berlin"
          apt-get update && apt-get install -y --no-install-recommends libgcc-13-dev
          case "${{ matrix.os }}" in
            ubuntu-24.04)     libduckdb=static-libs-linux-amd64.zip ;;
            ubuntu-24.04-arm) libduckdb=static-libs-linux-arm64.zip ;;
            *) echo "error ${{ matrix.os }}"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/${libduckdb}" -o ${libduckdb}
          unzip -o ${libduckdb} libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          PHP_EXECUTABLE=$(which php) NO_INTERACTION=1 TEST_PHP_ARGS="--show-diff --show-clean -q" make test
          php -d extension=$(pwd)/modules/pdo_duckdb.so test.php

  macos:
    name: "MacOS"
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP ${{ matrix.php-version }} ${{ matrix.thread-safety }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}
          fail-fast: true
      - name: Build & Test
        run: |
          sudo systemsetup -settimezone "Europe/Berlin"
          sudo systemsetup -gettimezone
          php -v
          date
          wget -q "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-osx-arm64.zip"
          unzip -o static-libs-osx-arm64.zip -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          ls -lisa modules/
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          php -d extension=$(pwd)/modules/pdo_duckdb.so -r '
            echo "PHP OK\n";
            $p = new PDO("duckdb::memory:");
            echo "PDO OK\n";
            $p->query("CREATE TABLE t (x INTEGER)");
            $p->query("INSERT INTO t VALUES (42)");
            foreach ($p->query("SELECT * FROM t") as $r) echo "ROW: " . json_encode($r) . "\n";
            $p->query("SET timezone = '\''UTC'\''");
            var_dump($p->query("SELECT TIMESTAMPTZ '\''1992-09-20 11:30:00.123456789'\''")->fetchColumn());
            $p->query("SET timezone = '\''Europe/Berlin'\''");
            var_dump($p->query("SELECT TIMESTAMPTZ '\''1992-09-20 11:30:00.123456789'\''")->fetchColumn());
          '
          # php -d extension=$(pwd)/modules/pdo_duckdb.so test.php
          php run-tests.php -d extension=$(pwd)/modules/pdo_duckdb.so --show-diff --show-clean -q
          PHP_EXECUTABLE=$(which php) NO_INTERACTION=1 TEST_PHP_ARGS="--show-diff --show-clean -q" make test

