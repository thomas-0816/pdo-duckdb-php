name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  composer-validate:
    name: "Validate using Composer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer
      - name: Validate
        run: composer validate --strict
  linux:
    name: "Linux"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup PHP ${{ matrix.php-version }} ${{ matrix.thread-safety }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}
      - name: Build & Test
        env:
          os: ${{ matrix.os }}
        run: |
          sudo timedatectl set-timezone "Europe/Berlin"
          case "$os" in
            ubuntu-24.04)     libduckdb=static-libs-linux-amd64.zip ;;
            ubuntu-24.04-arm) libduckdb=static-libs-linux-arm64.zip ;;
            *) echo "error os"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/${libduckdb}" -o ${libduckdb}
          unzip -o ${libduckdb} libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          NO_INTERACTION=1 TEST_PHP_ARGS="--show-diff --show-clean -q" make test
          php -d extension=$(pwd)/modules/pdo_duckdb.so test.php

  macos:
    name: "MacOS"
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        thread-safety:
          - zts
          - nts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup PHP ${{ matrix.php-version }} ${{ matrix.thread-safety }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
        env:
          phpts: ${{ matrix.thread-safety }}

      - name: Build & Test
        run: |
          sudo systemsetup -settimezone "Europe/Berlin"
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-osx-arm64.zip" -o static-libs-osx-arm64.zip
          unzip -o static-libs-osx-arm64.zip libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          NO_INTERACTION=1 TEST_PHP_ARGS="--show-diff --show-clean -q" make test
          php -d extension=$(pwd)/modules/pdo_duckdb.so test.php

  windows-build:
    name: Windows
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        ts:
          - nts
          - ts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download libduckdb
        shell: pwsh
        run: |
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb-src.zip
          Expand-Archive duckdb-src.zip -DestinationPath . -Force
          $url = "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          Expand-Archive duckdb.zip -DestinationPath . -Force
          Get-ChildItem -Path .
          tzutil /s "W. Europe Standard Time"
      - name: Build extension
        uses: php/php-windows-builder/extension@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8 # 1.8.1
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: x64
          args: --with-pdo-duckdb
          test-workers: 1

  asan:
    name: ASAN
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0:detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Put the clang ASan runtime on the loader path
        # -shared-libasan binaries (the configure C-compiler probe, the built
        # php, the extension) need libclang_rt.asan_*.so at runtime; it lives in
        # clang's resource dir, not a default loader path. Without this, php-src
        # configure fails with "cannot run C compiled programs".
        run: echo "LD_LIBRARY_PATH=$(clang -print-resource-dir)/lib/linux" >> "$GITHUB_ENV"
      - name: Build PHP with ASAN and PDO
        run: |
          sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf unzip
          git clone --depth=1 --branch=PHP-8.5 https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --enable-pdo \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install
      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          sudo timedatectl set-timezone "Europe/Berlin"
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-linux-amd64.zip" -o static-libs-linux-amd64.zip
          unzip -o static-libs-linux-amd64.zip libduckdb_static.a -d ./
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure --with-pdo-duckdb --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)
      - name: Run tests under ASAN
        run: |
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/pdo_duckdb.so"
          export NO_INTERACTION=1
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan --show-clean -g FAIL,BORK,LEAK,XLEAK

  valgrind:
    name: "Valgrind"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.5
          coverage: none
        env:
          phpts: nts
      - name: Build & Test
        run: |
          sudo timedatectl set-timezone "Europe/Berlin"
          sudo apt-get update && sudo apt-get install -y valgrind
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-linux-amd64.zip" -o static-libs-linux-amd64.zip
          unzip -o static-libs-linux-amd64.zip libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          NO_INTERACTION=1 TEST_PHP_ARGS="--show-diff --show-clean -q -m -j$(nproc)" make test

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          persona: pedantic

  intree:
    name: InTree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build PHP with pdo-duckdb-php in-tree
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential autoconf libtool bison re2c pkg-config unzip
          git clone --depth=1 --branch=PHP-8.5 https://github.com/php/php-src.git
          cd php-src/ext
          git clone --depth=1 --branch=main https://github.com/thomas-0816/pdo-duckdb-php.git
          cd pdo-duckdb-php
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-linux-amd64.zip" -o static-libs-linux-amd64.zip
          unzip -o static-libs-linux-amd64.zip libduckdb_static.a -d ./
          cd ../../
          ./buildconf --force
          ./configure --disable-zts --disable-all --enable-cli --enable-pcntl --enable-pdo --with-pdo-duckdb
          make -j$(nproc)
          sapi/cli/php -m | grep duckdb
          sapi/cli/php <<'EOF'
              <?php
              if (!extension_loaded("pdo_duckdb")) throw new Exception('Error loading');
              $db = new PDO("duckdb::memory:");
              $db->exec("CREATE TABLE t(i INTEGER, s VARCHAR)");
              $db->exec("INSERT INTO t VALUES (1, 'foo'), (2, 'bar')");
              $t = $db->query("SELECT * FROM t ORDER BY i")->fetchAll(PDO::FETCH_KEY_PAIR);
              if ($t !== ['1' => 'foo', '2' => 'bar']) throw new Exception('Error select');
              echo 'ok', PHP_EOL;
          EOF
          echo 'OK'

  parallel:
    name: Parallel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          coverage: none
          extensions: parallel
        env:
          phpts: zts
      - name: Build PHP with pdo-duckdb-php parallel
        run: |
          sudo timedatectl set-timezone "Europe/Berlin"
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-linux-amd64.zip" -o static-libs-linux-amd64.zip
          unzip -o static-libs-linux-amd64.zip libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          php -d extension=$(pwd)/modules/pdo_duckdb.so test_parallel.php
          echo 'OK'

  frankenphp:
    name: "FrankenPHP"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup
        run: |
          sudo curl -s https://pkg.henderkes.com/api/packages/85/debian/repository.key -o /etc/apt/keyrings/static-php85.asc
          echo "deb [signed-by=/etc/apt/keyrings/static-php85.asc] https://pkg.henderkes.com/api/packages/85/debian php-zts main" | \
              sudo tee -a /etc/apt/sources.list.d/static-php85.list
          sudo apt-get update
          sudo apt-get install php-zts-cli php-zts-pdo frankenphp apache2-utils
          sudo timedatectl set-timezone "Europe/Berlin"
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-src.zip" -o libduckdb-src.zip
          unzip -o libduckdb-src.zip duckdb.h duckdb.hpp -d ./
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.4/static-libs-linux-amd64.zip" -o static-libs-linux-amd64.zip
          unzip -o static-libs-linux-amd64.zip libduckdb_static.a -d ./
          phpize
          ./configure --with-pdo-duckdb
          make
          sudo make install
          frankenphp php-server -l 127.0.0.1:8080 --no-compress -r ./ &
          sleep 3
          curl -i http://127.0.0.1:8080/test.php
          ab -n 1000 -c 8 http://127.0.0.1:8080/test.php
          php -d extension=$(pwd)/modules/pdo_duckdb.so -m | grep duckdb
          echo 'OK'
